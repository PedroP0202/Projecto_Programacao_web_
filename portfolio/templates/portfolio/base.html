<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Portfólio Académico{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            color: #1f2937;
        }

        header {
            background: #ffffff;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
            padding: 16px;
        }

        nav {
            max-width: 1040px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        nav a {
            color: #0f766e;
            text-decoration: none;
            font-weight: 700;
        }

        main {
            max-width: 1040px;
            margin: 0 auto;
            padding: 28px 16px 40px;
        }

        section,
        article {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
            margin-bottom: 18px;
        }

        h1,
        h2,
        h3 {
            margin-top: 0;
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .stats {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        .stat {
            background: #ecfeff;
            border-radius: 10px;
            padding: 12px;
        }

        .muted {
            color: #6b7280;
        }

        ul {
            margin-bottom: 0;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'home' %}">Início</a>
            <a href="{% url 'licenciatura' %}">Licenciatura</a>
            <a href="{% url 'ucs' %}">UCs</a>
            <a href="{% url 'docentes' %}">Docentes</a>
            <a href="{% url 'projetos' %}">Projetos</a>
            <a href="{% url 'tecnologias' %}">Tecnologias</a>
            <a href="{% url 'competencias' %}">Competências</a>
            <a href="{% url 'formacoes' %}">Formações</a>
            <a href="{% url 'interesses' %}">Interesses</a>
            <a href="{% url 'makingof' %}">Making Of</a>
            <a href="{% url 'tfcs' %}">TFCs</a>
            <a href="{% url 'cursos' %}">Escola Online</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
